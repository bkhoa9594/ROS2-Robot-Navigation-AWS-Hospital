mobile_base_controller: # ten bo controller da khai bao
  ros__parameters:
    type: omni_drive_controller/OmniDriveController
    use_stamped_vel: False
    #lua chon pt dong hoc Omni
    left_front_wheel  : 'wheel_front_left_joint'
    left_back_wheel  : 'wheel_rear_left_joint'
    right_front_wheel : 'wheel_front_right_joint'
    right_back_wheel : 'wheel_rear_right_joint'

    # In ROS1 these physical properties were parsed from the URDF
    # Nen khai bao thong so cu the khong nen lay tu file URDF sang vi luc thiet ke 2D 3D va gia cong se khac nhau
    wheel_radius: 0.0762
    wheel_separation: 0.44715
    axis_separation: 0.488

    # @TODO: if wheel odometry is calibrated; these parameters should be in a separate yaml
    # bo sung them cac he so de canh chinh, luc thiet ke va gia cong
    wheel_separation_multiplier: 1.0
    wheel_radius_multiplier: 1.0
    axis_separation_multiplier: 1.0

    # The params below were used in ROS1 but not yet in ROS2

    publish_rate: 50.0 # Tan so gui tin hieu dieu khien xuong ben duoi, bi gioi han boi thiet bi, toc do b0 nhung, yeu cau thuc te
    pose_covariance_diagonal : [0.001, 0.001, 0.001, 0.001, 0.001, 0.01]
    twist_covariance_diagonal: [0.001, 0.001, 0.001, 0.001, 0.001, 0.01]

    # Velocity commands timeout [s]
    cmd_vel_timeout: 0.25

    # Base frame_id
    base_frame_id: base_footprint

    # odom tf will be published by direct laser odometry
    # Tat dinh vi tu encoder, lay dinh vi odometry tu lidar tro ve 
    enable_odom_tf: false

    # Odom frame_id
    odom_frame_id: odom

    # Publish limited velocity
    publish_limited_velocity: true

    # Velocity and acceleration limits
    # Whenever a min_* is unspecified, default to -max_*
    # Gioi han van toc dua tren thuc te phan cung va yeu cau ky thuat
    linear:
      x:
        has_velocity_limits    : true
        max_velocity           :  1.0 # m/s
        min_velocity           : -1.0 # m/s
        has_acceleration_limits: true
        max_acceleration       :  1.0 # m/s^2
        min_acceleration       :  -1.0 # m/s^2
        has_jerk_limits        : false
        max_jerk               :  5.0 # m/s^3
      y:
        has_velocity_limits    : true
        max_velocity           :  1.0 # m/s
        min_velocity           : -1.0 # m/s
        has_acceleration_limits: true
        max_acceleration       :  1.0 # m/s^2
        min_acceleration       :  -1.0 # m/s^2
        has_jerk_limits        : false
        max_jerk               :  5.0 # m/s^3
    angular:
      z:
        has_velocity_limits    : true
        max_velocity           : 2.09 # 120.0º reduce pendulum effect
        has_acceleration_limits: true
        max_acceleration       : 2.09 # 120.0º/s^2
        min_acceleration       : -2.09 # 120.0º/s^2
        has_jerk_limits        : false
        max_jerk               : 10.47 # 600.0º/s^3
    space:
      xy:
        max_velocity           : 0.7
      xz:
        max_velocity           : 0.5
      yz:
        max_velocity           : 0.5
      xyz:
        max_velocity           : 0.4
