# ==============================================================================
# ROS 2 Control Configuration for Mecanum Drive Robot (Jazzy/Harmonic)
# Hardware: ROG Zephyrus M15 Simulation Environment
# ==============================================================================

controller_manager:
  ros__parameters:
    # High-level update rate for the control loop (Hz)
    update_rate: 100
    # Mandatory for Gazebo simulations to synchronize with the physics clock
    use_sim_time: true   

    # Controller definitions and their respective types
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    imu_sensor_broadcaster:
      type: imu_sensor_broadcaster/IMUSensorBroadcaster

    mobile_base_controller:
      type: mecanum_drive_controller/MecanumDriveController

# ------------------------------------------------------------------------------
# Joint State Broadcaster: Publishes joint positions/velocities to /joint_states
# ------------------------------------------------------------------------------
joint_state_broadcaster:
  ros__parameters:
    use_sim_time: true
# ------------------------------------------------------------------------------
# IMU Sensor Broadcaster: Interfaces Gazebo IMU data with the ROS ecosystem
# ------------------------------------------------------------------------------
imu_sensor_broadcaster:
  ros__parameters:
    use_sim_time: true
    sensor_name: "base_imu_sensor"
    frame_id: "base_imu_link"


# ------------------------------------------------------------------------------
# Mecanum Drive Controller: Core logic for holonomic motion and odometry
# ------------------------------------------------------------------------------
mobile_base_controller:
  ros__parameters:
    reference_timeout: 2.0 
    #use_stamped_vel: true 
    publish_rate: 50.0 
    use_sim_time: true 
    tf_frame_prefix: ""        
    # Wheel joint mapping
    front_left_wheel_command_joint_name: wheel_front_left_joint
    front_right_wheel_command_joint_name: wheel_front_right_joint
    rear_left_wheel_command_joint_name: wheel_rear_left_joint
    rear_right_wheel_command_joint_name: wheel_rear_right_joint
    
    # Robot Physical Kinematics
    kinematics:
      base_frame_offset:
        x: 0.0
        y: 0.0
        theta: 0.0
      wheels_radius: 0.0762
      # Geometric param: sum of distances from center to wheel (lx + ly)
      sum_of_robot_center_projection_on_X_Y_axis: 0.25

    # Odometry and Transform (TF) Settings
    base_frame_id: base_link
    odom_frame_id: odom
    # Enables the map->odom->base_footprint transform chain for SLAM
    enable_odom_tf: false
    use_local_topics: false
    
    # Safety: stops the robot if no command is received within this window (seconds)
    reference_timeout: 2.0

    # Covariance matrices for pose (position/orientation) and twist (velocity)
    # Format: [x, y, z, roll, pitch, yaw]
    pose_covariance_diagonal: [0.001, 0.001, 0.001, 0.001, 0.001, 0.01]
    twist_covariance_diagonal: [0.001, 0.001, 0.001, 0.001, 0.001, 0.01]
